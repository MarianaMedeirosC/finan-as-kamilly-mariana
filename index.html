<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Kamilly &amp; Mariana — Gestão Financeira</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bone:    '#ddd8c4',
            celadon: '#a3c9a8',
            teal1:   '#84b59f',
            teal2:   '#69a297',
            af:      '#50808e',
          },
          fontFamily: {
            sans:  ['Inter','system-ui','sans-serif'],
            serif: ['Lora','Georgia','serif'],
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#edeae0;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent}
    input,select,button,textarea{font-family:'Inter',sans-serif}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#84b59f;border-radius:4px}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .fade-down{animation:fadeDown 0.2s ease forwards}
    .slide-up{animation:slideUp 0.25s ease forwards}
    .modal-bg{position:fixed;inset:0;background:rgba(44,66,60,0.4);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
    input[type="date"]::-webkit-calendar-picker-indicator{opacity:0.5;cursor:pointer}
  </style>
  <script>
    window.addEventListener('error', function(e) {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.innerHTML = '<div style="text-align:center;padding:32px;font-family:Georgia,serif;color:#50808e"><div style="font-size:32px;margin-bottom:12px">🌿</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">Kamilly & Mariana</div><div style="font-size:12px;color:#6b8c82;font-family:Inter,sans-serif">Erro ao carregar: ' + (e.message||'') + '<br><br>Tente recarregar a página.</div></div>';
      }
    });
  </script>
</head>
<body>
<div id="root"></div>
<div id="loading" style="position:fixed;inset:0;background:#edeae0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:999">
  <div style="font-family:'Inter',sans-serif;font-size:28px">🌿</div>
  <div style="font-family:Georgia,serif;font-size:16px;color:#50808e;font-weight:600">Kamilly &amp; Mariana</div>
  <div style="font-size:11px;color:#6b8c82;letter-spacing:.1em;text-transform:uppercase">Carregando...</div>
</div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

/* ── PALETTE ── */
const P = {
  bone:'#ddd8c4', celadon:'#a3c9a8', teal1:'#84b59f',
  teal2:'#69a297', af:'#50808e',
  bg:'#edeae0', white:'#ffffff',
  text:'#2c3e38', muted:'#6b8c82', border:'#ccc9b6',
  shadow:'rgba(80,128,142,0.10)',
  grad:'linear-gradient(135deg,#50808e 0%,#69a297 100%)',
};

/* ── HELPERS ── */
const fmt   = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtDt = d => { if(!d)return''; const p=d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; };
const today = () => new Date().toISOString().split('T')[0];
const nowStr= () => { const n=new Date(); return n.toLocaleDateString('pt-BR')+' às '+n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); };
const uid   = () => typeof crypto!=='undefined'&&crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2);
const esc   = s => String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]||c));

const DEFAULT_CATS = ['Transporte','Supermercado','Higiene','Lanche','Lazer','Saúde','Moradia','Entretenimento','Assinaturas','Beleza'];

function loadLocal(){
  try{
    const e=localStorage.getItem('mk_exp3'), c=localStorage.getItem('mk_cat3');
    return { data: e?JSON.parse(e):{mariana:[],kamilly:[]}, cats: c?JSON.parse(c):[...DEFAULT_CATS] };
  }catch{ return { data:{mariana:[],kamilly:[]}, cats:[...DEFAULT_CATS] }; }
}
function saveLocal(data,cats){
  try{ localStorage.setItem('mk_exp3',JSON.stringify(data)); localStorage.setItem('mk_cat3',JSON.stringify(cats)); }catch{}
}

/* ── TOAST HOOK ── */
function useToast(){
  const [list,setList]=useState([]);
  const push=useCallback((msg,type='s')=>{
    const id=uid();
    setList(l=>[...l,{id,msg,type}]);
    setTimeout(()=>setList(l=>l.filter(x=>x.id!==id)),3800);
  },[]);
  return {list,push};
}

function Toasts({list}){
  if(!list.length) return null;
  const colors={s:P.af, e:'#7b3535', w:'#7a6020'};
  const icons ={s:'✓', e:'✕', w:'⚠'};
  return(
    <div style={{position:'fixed',top:16,right:16,zIndex:200,display:'flex',flexDirection:'column',gap:8,maxWidth:290,pointerEvents:'none'}}>
      {list.map(t=>(
        <div key={t.id} className="fade-down" style={{background:colors[t.type]||P.af,color:'#fff',borderRadius:10,padding:'11px 15px',fontSize:12,fontWeight:600,boxShadow:'0 4px 20px rgba(0,0,0,0.18)',display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:15,lineHeight:1}}>{icons[t.type]||'✓'}</span>{t.msg}
        </div>
      ))}
    </div>
  );
}

/* ── PRIMITIVES ── */
const baseInput={width:'100%',padding:'10px 12px',borderRadius:8,border:`1.5px solid ${P.border}`,fontSize:13,fontWeight:500,background:P.white,color:P.text,outline:'none',fontFamily:'Inter,sans-serif',minHeight:44,WebkitAppearance:'none',appearance:'none',transition:'border-color .15s, box-shadow .15s'};

function Inp({style={},focus,onFocus,onBlur,...p}){
  const [f,setF]=useState(false);
  return <input {...p} style={{...baseInput,...(f?{borderColor:P.teal2,boxShadow:`0 0 0 3px rgba(105,162,151,.15)`}:{}),...style}} onFocus={()=>setF(true)} onBlur={()=>setF(false)}/>;
}

function Sel({style={},children,...p}){
  const [f,setF]=useState(false);
  return(
    <div style={{position:'relative'}}>
      <select {...p} style={{...baseInput,paddingRight:28,...(f?{borderColor:P.teal2,boxShadow:`0 0 0 3px rgba(105,162,151,.15)`}:{}),...style}} onFocus={()=>setF(true)} onBlur={()=>setF(false)}>{children}</select>
      <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',color:P.muted,pointerEvents:'none',fontSize:9}}>▾</span>
    </div>
  );
}

function Btn({children,v='primary',style={},...p}){
  const variants={
    primary:{background:P.grad,color:'#fff',boxShadow:`0 2px 10px rgba(80,128,142,.3)`},
    secondary:{background:P.bone,color:P.text,border:`1px solid ${P.border}`},
    ghost:{background:'transparent',color:P.af,border:`1.5px solid ${P.teal1}`},
    danger:{background:'#f5eaea',color:'#8b3a3a',border:`1px solid #e0c0c0`},
  };
  return <button style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,fontFamily:'Inter,sans-serif',fontWeight:600,fontSize:13,borderRadius:8,minHeight:44,cursor:'pointer',border:'none',padding:'10px 16px',transition:'opacity .15s',letterSpacing:'.02em',...variants[v],...style}} {...p}>{children}</button>;
}

function Fld({label,children}){
  return(
    <div style={{display:'flex',flexDirection:'column',gap:5}}>
      <label style={{fontSize:9,fontWeight:700,color:P.muted,textTransform:'uppercase',letterSpacing:'.12em'}}>{label}</label>
      {children}
    </div>
  );
}

function Chip({label}){
  return <span style={{display:'inline-block',padding:'2px 8px',borderRadius:5,fontSize:10,fontWeight:600,background:P.teal2+'22',color:P.teal2,letterSpacing:'.03em',whiteSpace:'nowrap'}}>{label}</span>;
}

/* ── MODAL ── */
function Modal({open,onClose,title,children,maxW=420}){
  useEffect(()=>{ document.body.style.overflow=open?'hidden':''; return()=>{document.body.style.overflow='';} },[open]);
  if(!open) return null;
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="slide-up" style={{background:P.white,borderRadius:20,padding:24,width:'100%',maxWidth:maxW,maxHeight:'92vh',overflowY:'auto',boxShadow:'0 24px 64px rgba(44,66,60,.22)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,paddingBottom:16,borderBottom:`1px solid ${P.bone}`}}>
          <span style={{fontFamily:'Lora,serif',fontWeight:700,fontSize:15,color:P.text}}>{title}</span>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:P.muted,fontSize:22,lineHeight:1,padding:4}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ── MANAGE CATEGORIES ── */
function ManageCats({open,onClose,cats,data,onChange,toast}){
  const [newCat,setNewCat]=useState('');
  const [editing,setEditing]=useState(null);

  const add=()=>{
    const n=newCat.trim();
    if(!n){toast('Digite um nome.','w');return;}
    if(cats.some(c=>c.toLowerCase()===n.toLowerCase())){toast('Já existe.','w');return;}
    onChange([...cats,n],null,null);
    setNewCat('');
    toast(`"${n}" adicionada!`,'s');
  };

  const del=i=>{
    const name=cats[i];
    const inUse=data.mariana.some(e=>e.category===name)||data.kamilly.some(e=>e.category===name);
    onChange(cats.filter((_,idx)=>idx!==i),null,null);
    toast(inUse?`"${name}" excluída. Despesas existentes mantêm o rótulo.`:`"${name}" excluída.`,'s');
  };

  const rename=i=>{
    const n=(editing?.val||'').trim();
    if(!n){toast('Digite um nome.','w');return;}
    if(cats.some((c,idx)=>idx!==i&&c.toLowerCase()===n.toLowerCase())){toast('Já existe.','w');return;}
    const old=cats[i];
    onChange(cats.map((c,idx)=>idx===i?n:c),old,n);
    setEditing(null);
    toast('Renomeada!','s');
  };

  return(
    <Modal open={open} onClose={()=>{setEditing(null);onClose();}} title="⚙ Gerenciar Categorias" maxW={440}>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <Inp placeholder="Nova categoria..." value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} style={{flex:1}}/>
        <Btn v="primary" onClick={add} style={{flexShrink:0,padding:'10px 14px'}}>+ Criar</Btn>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:340,overflowY:'auto'}}>
        {cats.map((c,i)=>(
          <div key={c+i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'#f7f5ef',borderRadius:8,border:`1px solid ${P.bone}`}}>
            {editing?.idx===i?(
              <>
                <input value={editing.val} onChange={e=>setEditing({...editing,val:e.target.value})}
                  onKeyDown={e=>{if(e.key==='Enter')rename(i);if(e.key==='Escape')setEditing(null);}}
                  style={{...baseInput,flex:1,minHeight:34,padding:'6px 10px',fontSize:12}} autoFocus/>
                <Btn v="primary" onClick={()=>rename(i)} style={{minHeight:34,padding:'6px 12px',fontSize:12}}>✓</Btn>
                <Btn v="secondary" onClick={()=>setEditing(null)} style={{minHeight:34,padding:'6px 10px',fontSize:12}}>✕</Btn>
              </>
            ):(
              <>
                <Chip label={c}/>
                <span style={{flex:1,fontSize:13,fontWeight:500,color:P.text}}>{c}</span>
                <button onClick={()=>setEditing({idx:i,val:c,old:c})} style={{background:'none',border:'none',cursor:'pointer',color:P.muted,fontSize:15,padding:4}} title="Renomear">✎</button>
                <button onClick={()=>del(i)} style={{background:'none',border:'none',cursor:'pointer',color:'#8b3a3a',fontSize:15,padding:4}} title="Excluir">✕</button>
              </>
            )}
          </div>
        ))}
      </div>
    </Modal>
  );
}

/* ── EDIT EXPENSE ── */
function EditModal({open,onClose,exp,cats,onSave}){
  const [desc,setDesc]=useState('');
  const [val,setVal]=useState('');
  const [dt,setDt]=useState('');
  const [cat,setCat]=useState('');
  useEffect(()=>{ if(exp){setDesc(exp.description);setVal(exp.value);setDt(exp.date);setCat(exp.category);} },[exp]);
  const save=()=>{
    if(!desc.trim()||!val||parseFloat(val)<=0||!cat||!dt) return;
    onSave({desc:desc.trim(),val:parseFloat(val),dt,cat});
  };
  return(
    <Modal open={open} onClose={onClose} title="✎ Editar Despesa">
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <Fld label="Descrição"><Inp value={desc} onChange={e=>setDesc(e.target.value)}/></Fld>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Fld label="Valor (R$)"><Inp type="number" step="0.01" value={val} onChange={e=>setVal(e.target.value)}/></Fld>
          <Fld label="Data"><Inp type="date" value={dt} onChange={e=>setDt(e.target.value)}/></Fld>
        </div>
        <Fld label="Categoria">
          <Sel value={cat} onChange={e=>setCat(e.target.value)}>
            <option value="">Selecionar...</option>
            {cats.map(c=><option key={c} value={c}>{c}</option>)}
          </Sel>
        </Fld>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',paddingTop:12,borderTop:`1px solid ${P.bone}`}}>
          <Btn v="secondary" onClick={onClose}>Cancelar</Btn>
          <Btn v="primary" onClick={save}>Salvar alterações</Btn>
        </div>
      </div>
    </Modal>
  );
}

/* ── PANEL TABLE ── */
const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function PanelTable({data,cats,onEdit,onDelete}){
  const [srch,setSrch]=useState('');
  const [cat,setCat]=useState('all');
  const [sort,setSort]=useState('date_desc');
  const [day,setDay]=useState('');
  const [month,setMonth]=useState('');
  const [year,setYear]=useState('');
  const [minV,setMinV]=useState('');
  const [maxV,setMaxV]=useState('');
  const [showFilt,setShowFilt]=useState(false);

  const filtered=useMemo(()=>{
    let r=[...data];
    if(srch) r=r.filter(i=>(i.description||'').toLowerCase().includes(srch.toLowerCase())||(i.category||'').toLowerCase().includes(srch.toLowerCase()));
    if(cat!=='all') r=r.filter(i=>i.category===cat);
    if(day) r=r.filter(i=>new Date(i.date+'T12:00:00').getDate()===parseInt(day));
    if(month) r=r.filter(i=>new Date(i.date+'T12:00:00').getMonth()===parseInt(month)-1);
    if(year) r=r.filter(i=>new Date(i.date+'T12:00:00').getFullYear()===parseInt(year));
    if(minV) r=r.filter(i=>i.value>=parseFloat(minV));
    if(maxV) r=r.filter(i=>i.value<=parseFloat(maxV));
    r.sort((a,b)=>{
      if(sort==='date_asc') return new Date(a.date)-new Date(b.date);
      if(sort==='val_desc') return b.value-a.value;
      if(sort==='val_asc') return a.value-b.value;
      return new Date(b.date)-new Date(a.date);
    });
    return r;
  },[data,srch,cat,sort,day,month,year,minV,maxV]);

  const hasF=srch||cat!=='all'||day||month||year||minV||maxV;
  const clear=()=>{setSrch('');setCat('all');setDay('');setMonth('');setYear('');setMinV('');setMaxV('');setSort('date_desc');};
  const si={...baseInput,fontSize:11,minHeight:36,padding:'7px 10px'};

  return(
    <div>
      {/* Filter toggle */}
      <div style={{padding:'10px 16px',borderBottom:`1px solid ${P.bone}44`,background:'#f7f5ee',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <div style={{flex:1,position:'relative',minWidth:140}}>
          <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',fontSize:12,color:P.muted,pointerEvents:'none'}}>🔍</span>
          <input placeholder="Buscar item ou categoria..." value={srch} onChange={e=>setSrch(e.target.value)}
            style={{...si,paddingLeft:28,width:'100%'}}/>
        </div>
        <button onClick={()=>setShowFilt(v=>!v)} style={{background:showFilt?P.teal2+'22':'transparent',border:`1.5px solid ${showFilt?P.teal2:P.border}`,borderRadius:7,padding:'6px 10px',cursor:'pointer',color:showFilt?P.teal2:P.muted,fontSize:11,fontWeight:600,minHeight:36}}>
          ⚡ Filtros {hasF&&<span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:P.celadon,marginLeft:4}}/>}
        </button>
        {hasF&&<button onClick={clear} style={{background:'none',border:'none',cursor:'pointer',color:P.teal2,fontSize:11,fontWeight:600,padding:'6px 4px',minHeight:36}}>× Limpar</button>}
      </div>

      {showFilt&&(
        <div style={{padding:'12px 16px',borderBottom:`1px solid ${P.bone}44`,background:'#f3f1e8',display:'flex',flexDirection:'column',gap:8}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <select value={cat} onChange={e=>setCat(e.target.value)} style={{...si,WebkitAppearance:'none'}}>
              <option value="all">Categoria</option>
              {cats.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <select value={sort} onChange={e=>setSort(e.target.value)} style={{...si,WebkitAppearance:'none'}}>
              <option value="date_desc">↓ Mais recente</option>
              <option value="date_asc">↑ Mais antiga</option>
              <option value="val_desc">↓ Maior valor</option>
              <option value="val_asc">↑ Menor valor</option>
            </select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            <input type="number" placeholder="Dia" min="1" max="31" value={day} onChange={e=>setDay(e.target.value)} style={si}/>
            <select value={month} onChange={e=>setMonth(e.target.value)} style={{...si,WebkitAppearance:'none'}}>
              <option value="">Mês</option>
              {MONTHS.map((m,i)=><option key={i} value={i+1}>{m}</option>)}
            </select>
            <input type="number" placeholder="Ano" min="2020" max="2099" value={year} onChange={e=>setYear(e.target.value)} style={si}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <input type="number" placeholder="Valor mín (R$)" value={minV} onChange={e=>setMinV(e.target.value)} style={si}/>
            <input type="number" placeholder="Valor máx (R$)" value={maxV} onChange={e=>setMaxV(e.target.value)} style={si}/>
          </div>
        </div>
      )}

      {/* Table */}
      <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        <table style={{width:'100%',borderCollapse:'collapse',minWidth:380}}>
          <thead>
            <tr style={{background:'#f0ede3'}}>
              {['Data','Descrição','Cat.','Valor','Auditado',''].map((h,i)=>(
                <th key={i} style={{padding:'9px 12px',fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:P.muted,borderBottom:`1px solid ${P.bone}`,whiteSpace:'nowrap',textAlign:i===5?'right':'left',
                  display: i===4 ? 'none' : 'table-cell'}} className={i===4?'hidden md:table-cell':''}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.length===0?(
              <tr><td colSpan={6} style={{textAlign:'center',padding:'32px 16px',fontSize:12,color:P.muted,fontStyle:'italic'}}>
                {hasF?'Nenhuma despesa neste filtro.':'Nenhuma despesa registrada.'}
              </td></tr>
            ):filtered.map(exp=>(
              <tr key={exp.id} style={{borderBottom:`1px solid ${P.bone}33`,transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#f5f2e8'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'10px 12px',fontSize:11,color:P.muted,whiteSpace:'nowrap'}}>{fmtDt(exp.date)}</td>
                <td style={{padding:'10px 12px',fontSize:12,fontWeight:600,color:P.text,maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={exp.description}>{exp.description}</td>
                <td style={{padding:'10px 12px'}}><Chip label={exp.category}/></td>
                <td style={{padding:'10px 12px',fontSize:12,fontWeight:700,color:P.af,whiteSpace:'nowrap'}}>{fmt(exp.value)}</td>
                <td style={{padding:'10px 12px',fontSize:10,color:P.muted,whiteSpace:'nowrap',display:'none'}} className="hidden md:table-cell">
                  <div style={{fontWeight:600,color:P.text,fontSize:11}}>{exp.updatedByName||''}</div>
                  <div style={{fontSize:9}}>{exp.updatedAt||''}</div>
                </td>
                <td style={{padding:'10px 12px',textAlign:'right'}}>
                  <div style={{display:'flex',gap:2,justifyContent:'flex-end'}}>
                    <button onClick={()=>onEdit(exp)} style={{background:'none',border:'none',cursor:'pointer',padding:6,borderRadius:6,color:P.muted,fontSize:15,transition:'color .15s',minHeight:32,minWidth:32}}
                      onMouseEnter={e=>e.currentTarget.style.color=P.af} onMouseLeave={e=>e.currentTarget.style.color=P.muted}>✎</button>
                    <button onClick={()=>onDelete(exp.id)} style={{background:'none',border:'none',cursor:'pointer',padding:6,borderRadius:6,color:P.muted,fontSize:15,transition:'color .15s',minHeight:32,minWidth:32}}
                      onMouseEnter={e=>e.currentTarget.style.color='#8b3a3a'} onMouseLeave={e=>e.currentTarget.style.color=P.muted}>✕</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {filtered.length>0&&(
        <div style={{padding:'8px 14px',fontSize:10,color:P.muted,borderTop:`1px solid ${P.bone}44`,background:'#f7f5ee',display:'flex',justifyContent:'space-between'}}>
          <span>{filtered.length} registro{filtered.length!==1?'s':''}</span>
          <span style={{fontWeight:700,color:P.af}}>{fmt(filtered.reduce((s,i)=>s+i.value,0))}</span>
        </div>
      )}
    </div>
  );
}

/* ── APP ── */
function App(){
  const init=loadLocal();
  const [data,setData]=useState(init.data);
  const [cats,setCats]=useState(init.cats);
  const [user,setUser]=useState('mariana');
  const [session,setSession]=useState('Mariana');
  const [syncing,setSyncing]=useState(false);
  const [online,setOnline]=useState(false);

  // Form
  const [fDesc,setFDesc]=useState('');
  const [fVal,setFVal]=useState('');
  const [fDt,setFDt]=useState(today());
  const [fCat,setFCat]=useState('');

  // Modals
  const [showCats,setShowCats]=useState(false);
  const [editTarget,setEditTarget]=useState(null); // {owner, exp}

  // Global filters
  const [gCat,setGCat]=useState('all');
  const [gMonth,setGMonth]=useState('all');
  const [gSrch,setGSrch]=useState('');

  const {list:toasts,push:toast}=useToast();

  /* sync from firebase to local state */
  const applyCloud=useCallback((cloudData)=>{
    if(cloudData.expenses) setData(cloudData.expenses);
    if(cloudData.categories&&cloudData.categories.length) setCats(cloudData.categories);
    try{
      if(cloudData.expenses) localStorage.setItem('mk_exp3',JSON.stringify(cloudData.expenses));
      if(cloudData.categories) localStorage.setItem('mk_cat3',JSON.stringify(cloudData.categories));
    }catch{}
  },[]);

  const triggerSave=useCallback((d,c)=>{
    saveLocal(d,c);
    if(window.__cloudSave) window.__cloudSave(d,c);
  },[]);

  /* computed */
  const applyG=useCallback(list=>list.filter(i=>{
    const mc=gCat==='all'||i.category===gCat;
    let mm=true;
    if(gMonth!=='all'){const d=new Date(i.date+'T12:00:00');mm=d.getMonth()===parseInt(gMonth)-1&&d.getFullYear()===new Date().getFullYear();}
    const ms=!gSrch||(i.description||'').toLowerCase().includes(gSrch.toLowerCase())||(i.category||'').toLowerCase().includes(gSrch.toLowerCase());
    return mc&&mm&&ms;
  }),[gCat,gMonth,gSrch]);

  const fm=useMemo(()=>applyG(data.mariana),[data.mariana,applyG]);
  const fk=useMemo(()=>applyG(data.kamilly),[data.kamilly,applyG]);
  const tm=useMemo(()=>fm.reduce((s,i)=>s+i.value,0),[fm]);
  const tk=useMemo(()=>fk.reduce((s,i)=>s+i.value,0),[fk]);
  const tg=tm+tk;
  const pctM=tg>0?(tm/tg)*100:50;
  const pctK=tg>0?(tk/tg)*100:50;

  /* actions */
  const switchUser=u=>{
    setUser(u); setSession(u==='mariana'?'Mariana':'Kamilly');
    toast(`Usuário: ${u==='mariana'?'Mariana':'Kamilly'}`,'s');
  };

  const addExpense=()=>{
    if(!fDesc.trim()||!fVal||parseFloat(fVal)<=0||!fCat||!fDt){toast('Preencha todos os campos.','w');return;}
    const now=nowStr();
    const exp={id:uid(),description:fDesc.trim(),value:parseFloat(fVal),category:fCat,date:fDt,createdByName:session,createdAt:now,updatedByName:session,updatedAt:now};
    const next={...data,[user]:[...data[user],exp]};
    setData(next); triggerSave(next,cats);
    setFDesc(''); setFVal(''); setFDt(today()); setFCat('');
    toast(`Adicionado para ${session}!`,'s');
  };

  const deleteExp=(owner,id)=>{
    const next={...data,[owner]:data[owner].filter(e=>e.id!==id)};
    setData(next); triggerSave(next,cats); toast('Removido.','s');
  };

  const saveEdit=({desc,val,dt,cat})=>{
    if(!editTarget) return;
    const {owner,exp}=editTarget;
    const now=nowStr();
    const next={...data,[owner]:data[owner].map(e=>e.id===exp.id?{...e,description:desc,value:val,date:dt,category:cat,updatedByName:session,updatedAt:now}:e)};
    setData(next); triggerSave(next,cats); setEditTarget(null); toast('Atualizado!','s');
  };

  const handleCatsChange=(nextCats,oldName,newName)=>{
    let nd=data;
    if(oldName&&newName){
      nd={
        mariana:data.mariana.map(e=>e.category===oldName?{...e,category:newName}:e),
        kamilly:data.kamilly.map(e=>e.category===oldName?{...e,category:newName}:e),
      };
      setData(nd);
    }
    setCats(nextCats); triggerSave(nd,nextCats);
  };

  const exportExcel=()=>{
    if(!window.XLSX){toast('Aguarde as bibliotecas carregarem.','w');return;}
    const map=e=>({Data:e.date,Descrição:e.description,Categoria:e.category,Valor:e.value,Por:e.createdByName,Em:e.createdAt,'Editado por':e.updatedByName,'Edit. em':e.updatedAt});
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data.mariana.map(map)),'Mariana');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data.kamilly.map(map)),'Kamilly');
    XLSX.writeFile(wb,'Financas_Kamilly_Mariana.xlsx');
    toast('Excel exportado!','s');
  };

  /* expose for firebase module */
  window.__applyCloud=applyCloud;
  window.__setSyncing=setSyncing;
  window.__setOnline=setOnline;
  window.__getState=()=>({data,cats});

  /* ── RENDER ── */
  const panelProps=(owner,list)=>({
    data:list, cats,
    onEdit: exp=>setEditTarget({owner,exp}),
    onDelete: id=>deleteExp(owner,id),
  });

  return(
    <div style={{minHeight:'100vh',background:P.bg}}>
      <Toasts list={toasts}/>

      {/* HEADER */}
      <header style={{background:P.af,position:'sticky',top:0,zIndex:40,boxShadow:'0 2px 20px rgba(80,128,142,.3)'}}>
        <div style={{maxWidth:1280,margin:'0 auto',padding:'0 14px',height:56,display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
          <div style={{display:'flex',alignItems:'center',gap:10,minWidth:0}}>
            <div style={{width:34,height:34,borderRadius:10,background:'rgba(255,255,255,.18)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🌿</div>
            <div style={{minWidth:0}}>
              <div style={{fontFamily:'Lora,serif',fontWeight:700,fontSize:14,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',lineHeight:1.2}}>Kamilly &amp; Mariana</div>
              <div style={{fontSize:8,color:'rgba(255,255,255,.6)',textTransform:'uppercase',letterSpacing:'.12em',fontWeight:600,marginTop:2}}>Gestão Financeira</div>
            </div>
            {online&&<span style={{width:7,height:7,borderRadius:'50%',background:'#a3c9a8',flexShrink:0,boxShadow:'0 0 6px #a3c9a8'}} title="Sincronizado"/>}
            {syncing&&<span style={{fontSize:9,color:'rgba(255,255,255,.7)',flexShrink:0}}>↻</span>}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
            <div style={{background:'rgba(255,255,255,.15)',borderRadius:9999,padding:3,display:'flex',gap:3}}>
              {['mariana','kamilly'].map(u=>(
                <button key={u} onClick={()=>switchUser(u)} style={{padding:'5px 12px',borderRadius:9999,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,transition:'all .2s',minHeight:30,background:user===u?'#fff':'transparent',color:user===u?P.af:'rgba(255,255,255,.75)',fontFamily:'Inter,sans-serif'}}>
                  {u==='mariana'?'Mariana':'Kamilly'}
                </button>
              ))}
            </div>
            <button onClick={exportExcel} style={{background:'rgba(255,255,255,.15)',border:'none',borderRadius:8,width:34,height:34,cursor:'pointer',color:'#fff',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}} title="Exportar Excel">⬇</button>
          </div>
        </div>
      </header>

      <main style={{maxWidth:1280,margin:'0 auto',padding:'20px 14px 48px'}}>

        {/* TITLE */}
        <div style={{textAlign:'center',marginBottom:24}}>
          <h1 style={{fontFamily:'Lora,serif',fontWeight:700,fontSize:20,color:P.text,margin:'0 0 4px',lineHeight:1.25}}>Controle Financeiro — Análise de Despesas</h1>
          <p style={{fontSize:9,color:P.muted,textTransform:'uppercase',letterSpacing:'.15em',fontWeight:600,margin:0}}>Gestão integrada em tempo real</p>
        </div>

        {/* KPI */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
          {[{label:'Despesas Mariana',val:tm,pct:pctM,icon:'🌸'},{label:'Despesas Kamilly',val:tk,pct:pctK,icon:'🌿'}].map(({label,val,pct,icon})=>(
            <div key={label} style={{background:P.white,borderRadius:16,padding:16,border:`1px solid ${P.bone}`,boxShadow:`0 2px 12px ${P.shadow}`}}>
              <div style={{fontSize:9,fontWeight:700,color:P.muted,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <span>{label}</span><span style={{fontSize:18}}>{icon}</span>
              </div>
              <div style={{fontFamily:'Lora,serif',fontWeight:700,fontSize:20,color:P.text,marginBottom:4}}>{fmt(val)}</div>
              <div style={{fontSize:10,color:P.muted,fontWeight:500}}>{Math.round(pct)}% do total</div>
            </div>
          ))}
        </div>
        {/* Consolidated */}
        <div style={{background:P.grad,borderRadius:16,padding:20,marginBottom:20,boxShadow:'0 4px 20px rgba(80,128,142,.3)'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
            <div>
              <div style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.65)',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:6}}>Balanço Consolidado</div>
              <div style={{fontFamily:'Lora,serif',fontWeight:700,fontSize:26,color:'#fff'}}>{fmt(tg)}</div>
            </div>
            <span style={{fontSize:28}}>📊</span>
          </div>
          <div style={{display:'flex',borderRadius:6,overflow:'hidden',height:8,background:'rgba(255,255,255,.2)',marginBottom:8}}>
            <div style={{width:`${pctM}%`,background:'rgba(255,255,255,.85)',transition:'width .7s ease'}}/>
            <div style={{width:`${pctK}%`,background:'rgba(255,255,255,.4)',transition:'width .7s ease'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:9,fontWeight:700,color:'rgba(255,255,255,.7)',textTransform:'uppercase',letterSpacing:'.1em'}}>
            <span>Mariana {Math.round(pctM)}%</span><span>Kamilly {Math.round(pctK)}%</span>
          </div>
        </div>

        {/* FORM */}
        <div style={{background:P.white,borderRadius:16,border:`1px solid ${P.bone}`,boxShadow:`0 2px 12px ${P.shadow}`,padding:18,marginBottom:16}}>
          <div style={{fontSize:9,fontWeight:700,color:P.muted,textTransform:'uppercase',letterSpacing:'.12em',marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
            <span style={{color:P.teal2,fontSize:14}}>＋</span> Inserir Despesa
          </div>
          {/* User toggle */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
            {['mariana','kamilly'].map(u=>(
              <button key={u} onClick={()=>switchUser(u)} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'10px 12px',borderRadius:10,minHeight:48,cursor:'pointer',fontFamily:'Inter,sans-serif',border:user===u?`2px solid ${P.teal2}`:`2px solid ${P.bone}`,background:user===u?P.af:'#f5f2ea',color:user===u?'#fff':P.muted,fontWeight:700,fontSize:13,transition:'all .2s'}}>
                <span style={{width:24,height:24,borderRadius:6,background:user===u?'rgba(255,255,255,.2)':P.bone,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Lora,serif',fontWeight:700,fontSize:13}}>
                  {u==='mariana'?'M':'K'}
                </span>
                {u==='mariana'?'Mariana':'Kamilly'}
              </button>
            ))}
          </div>
          {/* Fields */}
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <Fld label="Descrição"><Inp placeholder="Ex: Supermercado, Uber, Farmácia..." value={fDesc} onChange={e=>setFDesc(e.target.value)}/></Fld>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <Fld label="Valor (R$)"><Inp type="number" step="0.01" min="0" placeholder="0,00" value={fVal} onChange={e=>setFVal(e.target.value)}/></Fld>
              <Fld label="Data"><Inp type="date" value={fDt} onChange={e=>setFDt(e.target.value)}/></Fld>
            </div>
            <Fld label="Categoria">
              <div style={{display:'flex',gap:8}}>
                <div style={{flex:1}}>
                  <Sel value={fCat} onChange={e=>setFCat(e.target.value)}>
                    <option value="">Selecionar...</option>
                    {cats.map(c=><option key={c} value={c}>{c}</option>)}
                  </Sel>
                </div>
                <button onClick={()=>setShowCats(true)} style={{background:'#f0ece0',border:`1.5px solid ${P.bone}`,borderRadius:8,padding:'0 12px',cursor:'pointer',color:P.muted,fontSize:11,fontWeight:600,minHeight:44,whiteSpace:'nowrap',flexShrink:0}}>⚙ Editar</button>
              </div>
            </Fld>
            <Btn v="primary" onClick={addExpense} style={{width:'100%',marginTop:4,minHeight:48,fontSize:13}}>
              ＋ Adicionar para {user==='mariana'?'Mariana':'Kamilly'}
            </Btn>
          </div>
        </div>

        {/* GLOBAL FILTERS */}
        <div style={{background:P.white,borderRadius:16,border:`1px solid ${P.bone}`,boxShadow:`0 2px 12px ${P.shadow}`,marginBottom:16,overflow:'hidden'}}>
          <div style={{padding:'12px 16px',borderBottom:`1px solid ${P.bone}33`,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            <span style={{fontSize:10,fontWeight:700,color:P.text,display:'flex',alignItems:'center',gap:6,marginRight:4}}><span style={{color:P.teal2}}>⚡</span>Filtros Globais</span>
            <div style={{flex:1,minWidth:140,position:'relative'}}>
              <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',fontSize:11,color:P.muted,pointerEvents:'none'}}>🔍</span>
              <input placeholder="Buscar em ambas..." value={gSrch} onChange={e=>setGSrch(e.target.value)} style={{...baseInput,fontSize:11,minHeight:36,padding:'6px 10px 6px 28px',width:'100%'}}/>
            </div>
            <select value={gCat} onChange={e=>setGCat(e.target.value)} style={{...baseInput,fontSize:11,minHeight:36,padding:'6px 24px 6px 10px',flex:1,minWidth:130,WebkitAppearance:'none'}}>
              <option value="all">Todas as Categorias</option>
              {cats.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <select value={gMonth} onChange={e=>setGMonth(e.target.value)} style={{...baseInput,fontSize:11,minHeight:36,padding:'6px 24px 6px 10px',flex:1,minWidth:100,WebkitAppearance:'none'}}>
              <option value="all">Qualquer Mês</option>
              {['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'].map((m,i)=><option key={i} value={i+1}>{m}</option>)}
            </select>
            {(gSrch||gCat!=='all'||gMonth!=='all')&&<button onClick={()=>{setGSrch('');setGCat('all');setGMonth('all');}} style={{background:'none',border:'none',cursor:'pointer',color:P.teal2,fontSize:11,fontWeight:600,padding:'6px 0',whiteSpace:'nowrap'}}>× Limpar</button>}
          </div>
        </div>

        {/* PANELS */}
        <div style={{display:'grid',gridTemplateColumns:'1fr',gap:14}}>
          {[{owner:'mariana',label:'Mariana',av:'M',list:fm},{owner:'kamilly',label:'Kamilly',av:'K',list:fk}].map(({owner,label,av,list})=>(
            <div key={owner} style={{background:P.white,borderRadius:16,border:`1px solid ${P.bone}`,boxShadow:`0 2px 12px ${P.shadow}`,overflow:'hidden'}}>
              <div style={{padding:'14px 16px',borderBottom:`1px solid ${P.bone}`,background:`linear-gradient(to right,${P.bone}44,transparent)`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:40,height:40,borderRadius:10,background:P.af,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Lora,serif',fontWeight:700,fontSize:16,flexShrink:0}}>{av}</div>
                  <div>
                    <div style={{fontFamily:'Lora,serif',fontWeight:600,fontSize:14,color:P.text,textTransform:'uppercase',letterSpacing:'.06em'}}>{label}</div>
                    <div style={{fontSize:9,color:P.muted,textTransform:'uppercase',letterSpacing:'.08em',fontWeight:600,marginTop:2}}>Despesas Individuais</div>
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <span style={{padding:'3px 10px',borderRadius:5,fontSize:9,fontWeight:700,background:P.celadon+'33',color:P.teal2,textTransform:'uppercase',letterSpacing:'.1em',border:`1px solid ${P.celadon}`,display:'block',marginBottom:4}}>Gestor</span>
                  <span style={{fontSize:11,fontWeight:700,color:P.af}}>{fmt(list.reduce((s,i)=>s+i.value,0))}</span>
                </div>
              </div>
              <PanelTable {...panelProps(owner,list)}/>
            </div>
          ))}
        </div>
      </main>

      <footer style={{background:P.white,borderTop:`1px solid ${P.bone}`,padding:'18px 16px',textAlign:'center'}}>
        <div style={{fontFamily:'Lora,serif',fontWeight:600,fontSize:12,color:P.text,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:4}}>Planejamento Financeiro — Kamilly &amp; Mariana</div>
        <div style={{fontSize:10,color:P.muted}}>Dados sincronizados em tempo real via Firebase · {online?'🟢 Online':'🔴 Offline'}</div>
      </footer>

      <ManageCats open={showCats} onClose={()=>setShowCats(false)} cats={cats} data={data} onChange={handleCatsChange} toast={toast}/>
      <EditModal open={!!editTarget} onClose={()=>setEditTarget(null)} exp={editTarget?.exp} cats={cats} onSave={saveEdit}/>
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(<App/>);
// Hide loading screen
const _loading = document.getElementById('loading');
if (_loading) _loading.style.display = 'none';
</script>

<script type="module">
import { initializeApp }        from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDO2ubRlCGi2u0r9Br028P8TJF6P37A_64",
  authDomain:        "financas-kamilly-mariana.firebaseapp.com",
  projectId:         "financas-kamilly-mariana",
  storageBucket:     "financas-kamilly-mariana.firebasestorage.app",
  messagingSenderId: "235097781804",
  appId:             "1:235097781804:web:0c5c4aa3e193ddd7df8389"
};

try {
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const ref  = doc(db,'financas','casal');

  signInAnonymously(auth);

  onAuthStateChanged(auth, user => {
    if (!user) return;
    window.__setOnline && window.__setOnline(true);

    // ── OUVIR mudanças em tempo real ──
    onSnapshot(ref, snap => {
      if (snap.exists()) {
        const d = snap.data();
        window.__applyCloud && window.__applyCloud(d);
      }
    }, err => console.warn('Firestore listen:', err));

    // ── SALVAR no Firestore ──
    window.__cloudSave = async (data, cats) => {
      window.__setSyncing && window.__setSyncing(true);
      try {
        await setDoc(ref, {
          expenses:   data,
          categories: cats,
          updatedAt:  new Date().toISOString()
        });
      } catch(e) { console.error('Save error:', e); }
      window.__setSyncing && window.__setSyncing(false);
    };

    // Conecta o cloudSave ao triggerSave do React
    // O React chama window.__getState() + window.__cloudSave()
    // mas aqui roteamos pelo ref que o App expõe
  });

} catch(e) { console.error('Firebase init:', e); }
</script>
